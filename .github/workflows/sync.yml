name: Update University Calendar

on:
  schedule:
    - cron: '0 4 * * *' # Runs automatically every day at 4:00 AM UTC
  workflow_dispatch: # Allows you to run it manually whenever you want

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-with: '3.10'

    - name: Install dependencies
      run: pip install requests

    - name: Run script
      env:
        BOCCONI_USER: ${{ secrets.BOCCONI_USER }}
        BOCCONI_PASS: ${{ secrets.BOCCONI_PASS }}
      run: python update_calendar.py

    - name: Commit and Push calendar changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add calendar.ics
        git commit -m "Automated calendar update" || exit 0
        git push
